<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>민규 ♥ 다연 결혼합니다</title>
<style>
  :root{
    --bg:#FBF7F2; --card:#FFFFFF; --rose:#C08574; --rose-deep:#A66857;
    --text:#3A2E28; --text-soft:#7A6D63; --line:#E8DFD5;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:#DCD3C6; height:100%;}
  body{ font-family:-apple-system, 'Malgun Gothic', sans-serif; color:var(--text); display:flex; justify-content:center; min-height:100vh; }
  .frame{ width:100%; max-width:430px; background:var(--bg); min-height:100vh; position:relative; overflow-x:hidden; box-shadow:0 0 40px rgba(0,0,0,0.15); }

  .page-img{ width:100%; display:block; }

  section{ padding:0; }
  .action-block{ padding:22px 24px 40px; text-align:center; }
  .call-btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:14px 0; margin-bottom:12px; border-radius:8px; background:var(--text); color:#fff; font-size:14px; text-decoration:none; }
  .loc-group-label{ text-align:left; font-size:12px; color:var(--text-soft); margin:16px 0 8px; }
  .map-buttons{ display:flex; gap:8px; justify-content:center; margin-bottom:14px; }
  .map-buttons .map-btn{ flex:1; padding:12px 0; border-radius:8px; border:1px solid var(--line); background:var(--card); font-size:13px; color:var(--text); text-decoration:none; }
  .map-buttons.three .map-btn{ font-size:12px; }

  .rsvp-block{ padding:50px 28px; text-align:center; background:var(--card); border-top:1px solid var(--line); }
  .rsvp-title{ font-size:20px; margin-bottom:10px; letter-spacing:1px; }
  .rsvp-sub{ font-size:13px; color:var(--text-soft); margin-bottom:24px; line-height:1.7; }
  .rsvp-form{ display:flex; flex-direction:column; gap:12px; text-align:left; }
  .rsvp-form label{ font-size:12px; color:var(--text-soft); margin-bottom:4px; display:block; }
  .rsvp-form input, .rsvp-form select{ width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit; background:var(--bg); color:var(--text); }
  .rsvp-radios{ display:flex; gap:8px; }
  .rsvp-radios button{ flex:1; padding:12px 0; border-radius:8px; border:1px solid var(--line); background:var(--bg); font-size:13px; color:var(--text-soft); cursor:pointer; }
  .rsvp-radios button.active{ background:var(--rose); color:#fff; border-color:var(--rose); }
  .rsvp-submit{ margin-top:6px; padding:14px 0; border-radius:8px; border:none; background:var(--text); color:#fff; font-size:14px; letter-spacing:1px; cursor:pointer; }
  .rsvp-note{ font-size:11px; color:var(--text-soft); margin-top:10px; text-align:center; }

  #bgm-toggle{ position:fixed; top:16px; right:16px; width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,0.9); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(60,40,20,0.15); cursor:pointer; z-index:500; }
  #bgm-toggle svg{ width:20px; height:20px; }
  #bgm-toggle .disc{ animation:spin 3.5s linear infinite; animation-play-state:paused; }
  #bgm-toggle.playing .disc{ animation-play-state:running; }
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  .toast{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:#fff; padding:10px 18px; border-radius:20px; font-size:12px; opacity:0; transition:opacity 0.3s ease, transform 0.3s ease; z-index:1000; pointer-events:none; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<audio id="bgm" loop preload="none">
  <source src="music/bgm.mp3" type="audio/mpeg">
</audio>
<div id="bgm-toggle" onclick="toggleBgm()" aria-label="배경음악 재생/정지">
  <svg class="disc" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="9" stroke="#A66857" stroke-width="1.4"/>
    <circle cx="12" cy="12" r="2.6" fill="#A66857"/>
  </svg>
</div>

<div class="frame">

  <img class="page-img" src="images/cover.jpg" alt="커버">
  <img class="page-img" src="images/calendar.jpg" alt="일시 및 장소">
  <img class="page-img" src="images/info.jpg" alt="인사말 및 계좌안내">
  <img class="page-img" src="images/route.jpg" alt="오시는 길">

  <div class="action-block">
    <a class="call-btn" href="tel:0537561100">📞 예식장에 전화하기 (053-756-1100)</a>

    <div class="loc-group-label">지도 앱에서 보기</div>
    <div class="map-buttons">
      <a class="map-btn" href="https://map.kakao.com/?q=MH%EC%BB%A8%EB%B2%A4%EC%85%98" target="_blank" rel="noopener">카카오맵</a>
      <a class="map-btn" href="https://map.naver.com/p/search/MH%EC%BB%A8%EB%B2%A4%EC%85%98" target="_blank" rel="noopener">네이버지도</a>
    </div>

    <div class="loc-group-label">내비게이션으로 길찾기</div>
    <div class="map-buttons three">
      <a class="map-btn" href="tmap://route?goalname=MH%EC%BB%A8%EB%B2%A4%EC%85%98&goalx=128.6289&goaly=35.8695">티맵</a>
      <a class="map-btn" href="kakaonavi://navigate?name=MH%EC%BB%A8%EB%B2%A4%EC%85%98&x=128.6289&y=35.8695&coord_type=wgs84">카카오내비</a>
      <a class="map-btn" href="nmap://route/car?dlat=35.8695&dlng=128.6289&dname=MH%EC%BB%A8%EB%B2%A4%EC%85%98&appname=kwedding.invite">네이버내비</a>
    </div>
  </div>

  <div class="rsvp-block">
    <div class="rsvp-title">참석 의사 전달</div>
    <div class="rsvp-sub">원활한 준비를 위해 참석 여부를 알려주시면<br>큰 도움이 됩니다.</div>
    <div class="rsvp-form">
      <div>
        <label>성함</label>
        <input type="text" placeholder="이름을 입력해주세요">
      </div>
      <div>
        <label>구분</label>
        <select>
          <option>신랑측 하객</option>
          <option>신부측 하객</option>
        </select>
      </div>
      <div>
        <label>참석 여부</label>
        <div class="rsvp-radios">
          <button type="button" class="active" onclick="pickAttend(this)">참석</button>
          <button type="button" onclick="pickAttend(this)">불참</button>
          <button type="button" onclick="pickAttend(this)">미정</button>
        </div>
      </div>
      <div>
        <label>동반 인원</label>
        <input type="number" min="0" placeholder="0" value="0">
      </div>
      <button type="button" class="rsvp-submit" onclick="submitRsvp()">응답 보내기</button>
      <div class="rsvp-note">※ 예시 화면으로, 실제 응답은 저장되지 않습니다.</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const bgm = document.getElementById('bgm');
  const bgmBtn = document.getElementById('bgm-toggle');
  function toggleBgm(){
    if(bgm.paused){ bgm.play().then(()=>bgmBtn.classList.add('playing')).catch(()=>{}); }
    else { bgm.pause(); bgmBtn.classList.remove('playing'); }
  }
  function pickAttend(btn){
    btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  function submitRsvp(){ showToast('응답이 전달되었습니다 (예시)'); }
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 1800);
  }
</script>

</body>
</html>
